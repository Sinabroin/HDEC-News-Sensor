name: Scheduled Live Refresh

# D7-AH-1 — 매시간 라이브 리포트/대시보드 갱신 + 변동 기반 예약 알림 발송.
# 기본은 게시(공개 Pages 갱신)만 하고 발송은 닫혀 있다. 실제 발송은 repo Variable
# HOURLY_DELTA_AUTO_SEND='1' + 라이브 수집 성공(live_ok) + 확정 긴급 사건(shadow_alert_delta=true)
# 통과가 필요하다. Telegram은 기존 TELEGRAM_AUTO_SEND='1' opt-in도 함께 유지한다.
on:
  workflow_dispatch:
    inputs:
      force_dry_run:
        description: "Type 'true' to force dry-run even if TELEGRAM_AUTO_SEND is set (default empty)"
        required: false
        default: ""
  schedule:
    # GitHub schedule은 UTC 기준이며 best-effort라 수분 지연될 수 있다.
    - cron: '17 * * * *'

# 공개 Pages는 main의 docs/를 서빙한다 — 갱신분을 commit/push 하려면 write 권한 필요.
permissions:
  contents: write

# 슬롯 실행을 직렬화해 겹침/중복 발송·git push 충돌을 막는다.
concurrency:
  group: scheduled-live-refresh
  cancel-in-progress: false

env:
  # 검증/기본은 항상 mock 안전 모드 (네트워크/비밀값 0건). live 수집은 게시/발송 step에서만 명시 활성화.
  APP_MODE: mock
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scheduled-refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # 1) 게이트 (mock-safe · 비밀값/네트워크 0건). 이 예약 경로의 핵심 verifier들.
      #    예약 발송 가드 + 사람 검토 게이트 + 리포트/대시보드/정직성 회귀 검사.
      - name: Verify pipeline (mock-safe, no secrets)
        run: |
          python3 -m py_compile scripts/send_scheduled_telegram.py scripts/send_telegram.py scripts/detect_dashboard_alert_delta.py scripts/verify_hourly_delta_auto_send.py app/delta_classifier.py scripts/verify_meaningful_delta_quality.py
          python3 scripts/verify_teams_ai_push.py
          python3 scripts/verify_teams_push_state.py
          python3 scripts/verify_teams_ai_push_dry_run.py
          python3 scripts/verify_teams_ai_push_workflow_dry_run.py
          python3 scripts/verify_hourly_delta_auto_send.py --skip-operator-verifier
          python3 scripts/verify_meaningful_delta_quality.py
          python3 scripts/verify_scheduled_refresh_and_telegram.py
          python3 scripts/verify_human_review_gate.py
          python3 scripts/verify_static_report.py
          python3 scripts/verify_dashboard_real_data.py
          python3 scripts/verify_naver_news_adapter.py
          python3 scripts/verify_thebell_watch_policy.py
          python3 scripts/verify_deal_watch_collection.py
          python3 scripts/verify_known_missed_news_coverage.py
          python3 scripts/verify_dashboard_lens_integrity.py
          python3 scripts/verify_dashboard_accordion_sections.py
          python3 scripts/verify_dashboard_existing_rail_navigation.py
          python3 scripts/verify_hormuz_lens_relevance.py
          python3 scripts/verify_hormuz_ais_traffic.py
          python3 scripts/verify_national_ai_infra_relevance.py
          python3 scripts/verify_operator_controls.py
          python3 scripts/verify_operator_actual_buttons.py
          python3 scripts/verify_ai_market_exposure_quality.py
          python3 scripts/verify_data_source_honesty.py
          python3 scripts/verify_site_article_sensing.py
          python3 scripts/verify_weather_risk.py
          python3 scripts/verify_market_source_audit.py
          python3 scripts/verify_dashboard_ui_simplification.py
          python3 scripts/verify_rc3_public_truth.py

      - name: Snapshot dashboard before live build
        run: cp docs/daily/dashboard-latest.html "$RUNNER_TEMP/dashboard-before.html"

      # 2) live 리포트/대시보드 생성. build_static_report.py가 출력하는 news_data_mode로
      #    live 수집 성공(live_ok)을 판별한다 (단일 빌드 = 단일 수집). 실패(mock fallback)면
      #    작업 트리를 복원해 가짜 live 게시를 차단한다.
      #    ※ 공개 빌드는 비공개 감시 목록 경로(env)를 설정하지 않는다 — 감시 트리 미주입(사생활).
      - name: Build live report + dashboard
        id: build
        env:
          NEWS_MODE: live
          # Naver 보조 provider — 이미 생성된 repo secrets로 안전 주입 (값 미출력). 자격증명이
          # 없거나 실패해도 collector가 정직하게 skip하므로 live_ok 판정에는 영향이 없다.
          NAVER_NEWS_ENABLED: "1"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          MACRO_MODE: live
          # 이 step의 시장지표 snapshot을 휘발 파일로 남겨 아래 다이제스트 step이 동일 값을 쓰게 한다.
          MACRO_SNAPSHOT_FILE: ${{ runner.temp }}/macro_snapshot.json
          # 운영자 버튼이 호출할 공개 Operator API base URL (비밀값 아님 · repo variable).
          # 미설정이면 3개 실행 버튼을 비활성화하고 Operator API 미연결을 명시한다.
          OPERATOR_API_BASE: ${{ vars.OPERATOR_API_BASE }}
        run: |
          OUT="$(python3 scripts/build_static_report.py --output docs/daily/latest.html --audience executive)"
          echo "$OUT"
          if printf '%s' "$OUT" | grep -q "news_data_mode=live"; then
            # 공개 latest.html은 항상 executive 뷰 (operator 기본값 유출 방지, P0-D3R).
            python3 scripts/build_static_report.py --output docs/daily/operator-latest.html --audience operator
            python3 scripts/build_static_dashboard.py --market-mode live --output docs/daily/dashboard-latest.html --operator-api-base "$OPERATOR_API_BASE" --weather-mode live
            echo "live_ok=true" >> "$GITHUB_OUTPUT"
            echo "NEWS_MODE=live · published executive report + operator snapshot + dashboard"
          else
            echo "live_ok=false" >> "$GITHUB_OUTPUT"
            echo "NEWS_MODE=live · live collection failed/empty — NOT publishing as live"
            git checkout -- docs/daily/latest.html docs/daily/operator-latest.html docs/daily/dashboard-latest.html || true
          fi

      # 3) live 성공 시 이전/신규 대시보드의 핵심 알림 surface만 비교한다. 파싱 실패는
      #    step 실패로 닫히며, 신규 핵심 후보가 0건인 경우 alert_delta=false다.
      - name: Detect dashboard alert delta
        id: delta
        if: steps.build.outputs.live_ok == 'true'
        env:
          # 신규·변경 기사 delta payload를 runner temp에 '한 번' 생성한다 — 아래 Telegram/Teams가
          # 이 동일 파일을 소비해 각자 재수집하지 않는다(단일 fetch·채널 간 불일치 없음). alert_delta
          # GITHUB_OUTPUT 계약과 stdout(내용 없음)은 그대로다.
          DELTA_ARTIFACT_FILE: ${{ runner.temp }}/dashboard_delta.json
        run: |
          python3 scripts/detect_dashboard_alert_delta.py \
            "$RUNNER_TEMP/dashboard-before.html" \
            docs/daily/dashboard-latest.html \
            --github-output "$GITHUB_OUTPUT" \
            --delta-artifact "$DELTA_ARTIFACT_FILE"

      # 3A) 기사별 Teams AI 카드를 실제 발송 없이 준비한다. 같은 delta artifact를 읽고,
      #     runner temp의 빈 state만 읽기 때문에 운영 dedup state·webhook·SMTP를 건드리지 않는다.
      - name: Prepare Teams AI article cards (dry-run only)
        id: teams_ai_push_dry_run
        if: steps.build.outputs.live_ok == 'true'
        env:
          DELTA_ARTIFACT_FILE: ${{ runner.temp }}/dashboard_delta.json
          TEAMS_PUSH_STATE_PATH: ${{ runner.temp }}/teams_push_state_readonly.json
          TEAMS_AI_PUSH_DRY_RUN_DIR: ${{ runner.temp }}/teams-ai-push-dry-run
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || secrets.DASHBOARD_URL || '' }}
          REPORT_URL: ${{ vars.REPORT_URL || secrets.REPORT_URL || '' }}
        run: |
          rm -rf "$TEAMS_AI_PUSH_DRY_RUN_DIR"
          python3 scripts/prepare_teams_ai_push_dry_run.py \
            --artifact "$DELTA_ARTIFACT_FILE" \
            --state "$TEAMS_PUSH_STATE_PATH" \
            --output-dir "$TEAMS_AI_PUSH_DRY_RUN_DIR" \
            --dashboard-url "$DASHBOARD_URL" \
            --report-url "$REPORT_URL"
          python3 - "$TEAMS_AI_PUSH_DRY_RUN_DIR/manifest.json" "$GITHUB_OUTPUT" <<'PY'
          import json
          import sys
          from pathlib import Path

          manifest = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          safety = manifest.get("safety") or {}
          if safety.get("webhook_calls") != 0 or safety.get("smtp_connections") != 0:
              raise SystemExit("dry-run safety contract violated: network call count")
          if safety.get("state_write") is not False:
              raise SystemExit("dry-run safety contract violated: state write")
          with Path(sys.argv[2]).open("a", encoding="utf-8") as output:
              output.write(f"card_count={int(manifest.get('card_count') or 0)}\n")
              output.write(
                  f"dedup_blocked_count={int(manifest.get('dedup_blocked_count') or 0)}\n"
              )
          print(
              "Teams AI card dry-run summary: "
              f"cards={int(manifest.get('card_count') or 0)} "
              f"dedup_blocked={int(manifest.get('dedup_blocked_count') or 0)} "
              "webhook_calls=0 smtp_connections=0 state_writes=0"
          )
          PY

      - name: Upload Teams AI article cards dry-run artifact
        if: steps.build.outputs.live_ok == 'true' && steps.teams_ai_push_dry_run.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: teams-ai-news-push-dry-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/teams-ai-push-dry-run
          if-no-files-found: error
          retention-days: 3

      # 4) live 성공 시에만 갱신분을 main에 commit/push → 공개 Pages 갱신 (변경 없으면 skip).
      - name: Publish to Pages (commit live docs)
        if: steps.build.outputs.live_ok == 'true' && github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || github.event.inputs.force_dry_run != 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DOCS=(
            docs/daily/latest.html
            docs/daily/operator-latest.html
            docs/daily/dashboard-latest.html
          )

          if git diff --quiet -- "${DOCS[@]}"; then
            echo "live docs unchanged — skip commit"
          else
            git add -- "${DOCS[@]}"
            git commit -m "chore: scheduled live refresh"

            for attempt in 1 2 3; do
              echo "publish attempt ${attempt}/3: fetch + rebase + push"
              git fetch origin main

              if ! git rebase -X theirs origin/main; then
                echo "ERROR: rebase onto origin/main failed during scheduled publish"
                git rebase --abort || true
                exit 1
              fi

              if git push origin HEAD:main; then
                echo "scheduled live docs committed and pushed"
                exit 0
              fi

              echo "WARN: git push failed on attempt ${attempt}/3"
              if [ "${attempt}" -eq 3 ]; then
                echo "ERROR: scheduled live docs push failed after 3 attempts"
                exit 1
              fi

              sleep $((attempt * 5))
            done
          fi

      # 5) 예약 Telegram — hourly opt-in + 기존 Telegram opt-in + live + shadow confirmed urgency가 모두 필요하다.
      #    sender 내부 freshness/live 게이트도 그대로 통과해야 실제 발송된다.
      - name: Hourly telegram digest (delta-gated auto-send)
        if: steps.build.outputs.live_ok == 'true' && steps.delta.outputs.shadow_alert_delta == 'true' && vars.HOURLY_DELTA_AUTO_SEND == '1' && vars.TELEGRAM_AUTO_SEND == '1' && github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || github.event.inputs.force_dry_run != 'true')
        env:
          # 두 repo Variable이 모두 열린 step에서만 기존 sender opt-in을 주입한다.
          TELEGRAM_AUTO_SEND: ${{ vars.TELEGRAM_AUTO_SEND || '' }}
          TELEGRAM_ALLOW_MOCK: ${{ vars.TELEGRAM_ALLOW_MOCK || '' }}
          TELEGRAM_MAX_AGE_HOURS: ${{ vars.TELEGRAM_MAX_AGE_HOURS || '' }}
          FORCE_DRY_RUN: ${{ github.event.inputs.force_dry_run || '' }}
          # 발송 자격증명 — send_telegram.py가 상속받아 쓴다. 값은 출력되지 않는다.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          NEWS_MODE: live
          NAVER_NEWS_ENABLED: "1"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          MACRO_MODE: live
          MACRO_SNAPSHOT_FILE: ${{ runner.temp }}/macro_snapshot.json
          # inline 버튼 타겟 (vars 우선, 없으면 secrets). 미설정이면 버튼 없는 텍스트 발송.
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || secrets.DASHBOARD_URL || '' }}
          REPORT_URL: ${{ vars.REPORT_URL || secrets.REPORT_URL || '' }}
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME || secrets.TELEGRAM_BOT_USERNAME || '' }}
          # 위 delta 스텝이 만든 공유 delta payload — 재수집 없이 이 파일만 읽어 변동 우선(실제 KST)
          # 발송한다. Teams와 동일 파일 → 제목 시각·기사 목록이 채널 간 완전히 일치한다.
          DELTA_ARTIFACT_FILE: ${{ runner.temp }}/dashboard_delta.json
        run: |
          DRY_FLAG=""
          if [ "$FORCE_DRY_RUN" = "true" ]; then DRY_FLAG="--dry-run"; fi
          python3 scripts/send_scheduled_telegram.py $DRY_FLAG

      # 6) Teams 채널 이메일 — 이 step에 진입한 경우에만 SMTP send/approval/Teams gate를
      #    주입한다. sender 로그는 SMTP accepted와 실제 Teams 수신(unverified)을 분리한다.
      - name: Hourly Teams channel email (delta-gated auto-send)
        if: steps.build.outputs.live_ok == 'true' && steps.delta.outputs.shadow_alert_delta == 'true' && vars.HOURLY_DELTA_AUTO_SEND == '1' && github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || github.event.inputs.force_dry_run != 'true')
        env:
          EMAIL_SEND_MODE: send
          APPROVE_SEND_EMAIL: "true"
          SEND_TO_TEAMS: "true"
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_SMTP_APP_PASSWORD: ${{ secrets.GMAIL_SMTP_APP_PASSWORD }}
          GMAIL_SMTP_PASSWORD: ${{ secrets.GMAIL_SMTP_PASSWORD }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          TEAMS_CHANNEL_EMAIL: ${{ secrets.TEAMS_CHANNEL_EMAIL }}
          NEWS_MODE: live
          NAVER_NEWS_ENABLED: "1"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || secrets.DASHBOARD_URL || '' }}
          REPORT_URL: ${{ vars.REPORT_URL || secrets.REPORT_URL || '' }}
          # Telegram과 동일한 공유 delta payload를 소비한다(재수집 없음·채널 간 동일 시각/목록).
          DELTA_ARTIFACT_FILE: ${{ runner.temp }}/dashboard_delta.json
          # Teams Adaptive Card webhook(Power Automate Workflows) — 설정 시 카드를 우선 전송하고,
          # 실패/미설정이면 위 Teams 채널 이메일로 fallback한다. backend 전용 비밀값(값 미출력).
          TEAMS_WORKFLOW_WEBHOOK_URL: ${{ secrets.TEAMS_WORKFLOW_WEBHOOK_URL }}
        run: python3 scripts/send_email_alert.py

      - name: Skip automatic alerts (no delta)
        if: steps.build.outputs.live_ok == 'true' && steps.delta.outputs.shadow_alert_delta != 'true'
        run: |
          echo "no confirmed urgency — skip telegram"
          echo "no confirmed urgency — skip teams"
