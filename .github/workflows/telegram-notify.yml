name: Telegram Notify

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Custom message (leave empty to send the mock daily digest)"
        required: false
        default: ""
  schedule:
    - cron: "0 23 * * *" # UTC 23:00 = KST 08:00 — mock daily digest

env:
  APP_MODE: mock
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  send-telegram:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify digest pipeline (no network, no secrets)
        run: |
          python3 scripts/verify_telegram_digest.py
          python3 scripts/verify_executive_brief.py
          python3 scripts/verify_static_report.py

      # 발송 전 생성 확인용 — 게시는 commit된 docs/daily/latest.html을 통해서만 한다
      # (자동 commit/publish 없음, GitHub Pages 설정은 수동 — docs/daily/README.md).
      - name: Build static report (workspace check only)
        run: |
          python3 scripts/build_static_report.py --output docs/daily/latest.html

      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          # 빈 값이면 send_telegram.py가 mock daily digest를 생성해 발송한다.
          MESSAGE: ${{ github.event.inputs.message || '' }}
          # 설정돼 있으면 "오늘 브리프 보기" inline 버튼이 붙는다. 없으면 텍스트 전용
          # 발송이며 워크플로는 실패하지 않는다 (vars 우선, 없으면 secrets).
          REPORT_URL: ${{ vars.REPORT_URL || secrets.REPORT_URL || '' }}
        run: |
          python3 scripts/send_telegram.py
