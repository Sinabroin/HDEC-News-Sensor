name: Telegram Notify

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Custom message (leave empty to publish the live daily report; digest send still needs approve_send=true)"
        required: false
        default: ""
      approve_send:
        # P0-D3I — 사람 검토 / 수동 Send 게이트. 'true'로 명시 승인할 때만 실제 Telegram 발송.
        # 비어 있거나(기본) schedule 트리거면 send 게이트가 manual로 닫혀 발송하지 않는다.
        description: "Type 'true' to actually SEND the digest (default/empty = review only, report still publishes)"
        required: false
        default: ""
  schedule:
    - cron: "0 23 * * *" # UTC 23:00 = KST 08:00 — live daily report publish (digest send held for approval)

# 빈 메시지(예약/수동) 경로에서 live RSS 리포트를 main에 auto-commit하기 위해 필요.
permissions:
  contents: write

env:
  # 검증/파이프라인 기본은 항상 mock 안전 모드 (네트워크/비밀값 0건).
  # live 수집은 게시/발송 step에서만 NEWS_MODE/MACRO_MODE=live로 명시 활성화한다.
  APP_MODE: mock
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  send-telegram:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # 발송 전 게이트 — 전부 mock 안전 모드로 돈다 (NEWS_MODE 미설정 → mock).
      # verify_live_news_ingestion.py는 네트워크가 있으면 실제 공개 RSS 수집을
      # 시도하고, 없으면 SKIP한다 (가짜 성공 주장 안 함).
      - name: Verify pipeline (mock-safe, no secrets)
        run: |
          python3 scripts/verify_telegram_digest.py
          python3 scripts/verify_executive_brief.py
          python3 scripts/verify_executive_brief_quality.py
          python3 scripts/verify_static_report.py
          python3 scripts/verify_dashboard_export.py
          python3 scripts/verify_dashboard_real_data.py
          python3 scripts/verify_dashboard_article_quality.py
          python3 scripts/verify_news_source_access_policy.py
          python3 scripts/verify_report_link_targets.py
          python3 scripts/verify_data_source_honesty.py
          python3 scripts/verify_score_explanation_ui.py
          python3 scripts/verify_live_news_ingestion.py
          python3 scripts/verify_macro_snapshot_integration.py
          python3 scripts/verify_live_publish_path.py
          python3 scripts/verify_executive_ia_polish.py
          python3 scripts/verify_telegram_channel_to_personal_entry.py
          python3 scripts/verify_national_ai_infra_relevance.py

      # 빈 메시지면 live 게시 경로, 커스텀 메시지면 그대로 전달 경로.
      # 입력은 env로만 받아 shell 주입을 막는다.
      - name: Determine publish mode
        id: mode
        env:
          MESSAGE: ${{ github.event.inputs.message || '' }}
        run: |
          if [ -z "$MESSAGE" ]; then
            echo "live_publish=true" >> "$GITHUB_OUTPUT"
            echo "Publish mode: live daily report + digest (empty message)"
          else
            echo "live_publish=false" >> "$GITHUB_OUTPUT"
            echo "Publish mode: custom message passthrough"
          fi

      # NEWS_MODE=live로 리포트를 생성한다. build_static_report.py가 출력하는
      # news_data_mode로 live 수집 성공 여부(live_ok)를 판별한다 — 단일 빌드 = 단일 수집.
      # 실패(=mock fallback)면 작업 트리를 복원해 가짜 live 게시를 차단한다.
      - name: Build live daily report
        id: report
        if: steps.mode.outputs.live_publish == 'true'
        env:
          NEWS_MODE: live
          # Naver 보조 provider — 이미 생성된 repo secrets로 안전 주입 (P0-D2). 값은 출력하지
          # 않는다. 자격증명이 없거나 호출 실패해도 collector가 정직하게 skip하므로(전체 live
          # 수집은 실패하지 않음) live_ok 판정에는 영향이 없다.
          NAVER_NEWS_ENABLED: "1"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # 시장지표도 live로 연동한다 (P0-C2). 실패 시 macro는 '미연동' placeholder로
          # 강등될 뿐(가짜 값 0건) live_ok 판정은 뉴스 수집 성공 여부로만 한다.
          MACRO_MODE: live
          # 이 step이 fetch한 시장지표 snapshot을 휘발 파일로 남겨 아래 digest step이
          # 재fetch 없이 동일 값을 쓰게 한다(리포트·다이제스트 시세 불일치 방지, P0-C2).
          # runner temp는 commit되지 않으며 실행마다 새로 만들어진다.
          MACRO_SNAPSHOT_FILE: ${{ runner.temp }}/macro_snapshot.json
          # D7-AA — 운영자 버튼이 호출할 공개 Operator API base URL (비밀값 아님 · repo variable).
          # 미설정이면 빈 값 → 대시보드 버튼은 비활성 + '운영 API 미설정' 안내만 (GitHub 이동 없음).
          OPERATOR_API_BASE: ${{ vars.OPERATOR_API_BASE }}
        run: |
          OUT="$(python3 scripts/build_static_report.py --output docs/daily/latest.html --audience executive)"
          echo "$OUT"
          if printf '%s' "$OUT" | grep -q "news_data_mode=live"; then
            # 공개 latest.html은 항상 executive 뷰로 게시한다 (operator 기본값 유출 방지, P0-D3R).
            # 같은 live 데이터로 운영자 진단용 operator-latest.html 스냅샷도 함께 생성한다.
            python3 scripts/build_static_report.py --output docs/daily/operator-latest.html --audience operator
            python3 scripts/build_static_dashboard.py --output docs/daily/dashboard-latest.html --operator-api-base "$OPERATOR_API_BASE"
            echo "live_ok=true" >> "$GITHUB_OUTPUT"
            echo "NEWS_MODE=live · live RSS collected > 0 · executive report published + operator snapshot + dashboard export"
          else
            echo "live_ok=false" >> "$GITHUB_OUTPUT"
            echo "NEWS_MODE=live · live collection failed/empty · fell back to mock · NOT publishing as live"
            git checkout -- docs/daily/latest.html docs/daily/operator-latest.html docs/daily/dashboard-latest.html || true
          fi

      # live 성공 시에만 변경분을 main에 commit (변경 없으면 skip — 실패 안 함).
      - name: Commit live daily report
        if: steps.report.outputs.live_ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/daily/latest.html docs/daily/operator-latest.html docs/daily/dashboard-latest.html; then
            echo "live report unchanged — no diff, skip commit"
          else
            git add docs/daily/latest.html docs/daily/operator-latest.html docs/daily/dashboard-latest.html
            git commit -m "chore: update live daily report"
            git push
            echo "live report committed and pushed"
          fi

      # 경로 1a: live 게시 성공 → NEWS_MODE=live 다이제스트 발송 (버튼은 DASHBOARD_URL/REPORT_URL).
      - name: Send live daily digest
        if: steps.report.outputs.live_ok == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          # P0-D3I — 발송 게이트: approve_send=true(수동 승인)일 때만 send, 그 외/예약은 manual(비발송).
          TELEGRAM_SEND_MODE: ${{ github.event.inputs.approve_send == 'true' && 'send' || 'manual' }}
          REVIEW_APPROVED: ${{ github.event.inputs.approve_send == 'true' && 'true' || 'false' }}
          NEWS_MODE: live
          # Naver 보조 provider — 이미 생성된 repo secrets로 안전 주입 (P0-D2). 값은 출력하지 않는다.
          NAVER_NEWS_ENABLED: "1"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # 시장지표도 live로 연동 (P0-C2) — 수집 실패 시 digest는 macro 블록을 생략한다(가짜 값 0건).
          MACRO_MODE: live
          # 위 리포트 step이 남긴 snapshot 파일을 읽어 동일 시세를 쓴다(재fetch 없음 → 불일치 0).
          # 파일이 없으면(리포트 macro 실패 등) digest가 스스로 fetch하거나 미연동으로 강등한다.
          MACRO_SNAPSHOT_FILE: ${{ runner.temp }}/macro_snapshot.json
          # 설정돼 있으면 "대시보드 보기" inline 버튼이 붙는다 (vars 우선, 없으면 secrets).
          # 없으면 send_telegram.py가 REPORT_URL의 /daily/latest.html에서 dashboard-latest.html을 파생한다.
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || secrets.DASHBOARD_URL || '' }}
          # 설정돼 있으면 "상세 리포트 보기" inline 버튼이 붙는다 (vars 우선, 없으면 secrets).
          REPORT_URL: ${{ vars.REPORT_URL || secrets.REPORT_URL || '' }}
          # 설정돼 있으면 "개인 질의하기" 1:1 봇 deep link 버튼이 붙는다 (P0-C1.10, 비밀값 아님).
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME || secrets.TELEGRAM_BOT_USERNAME || '' }}
        run: |
          # 발송 전 버튼 타겟 검증 (동일 env). 요약↔전체 링크가 어긋나면 여기서 실패해 send 차단.
          python3 scripts/send_telegram.py --preflight
          python3 scripts/send_telegram.py

      # 경로 1b: live 수집 실패 → mock(데모)으로 정직 라벨된 fallback 다이제스트 발송.
      # NEWS_MODE를 켜지 않으므로 digest는 스스로 "mock 데이터 기반"으로 표기한다.
      - name: Send fallback daily digest
        if: steps.mode.outputs.live_publish == 'true' && steps.report.outputs.live_ok != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          # P0-D3I — 발송 게이트: approve_send=true(수동 승인)일 때만 send, 그 외/예약은 manual(비발송).
          TELEGRAM_SEND_MODE: ${{ github.event.inputs.approve_send == 'true' && 'send' || 'manual' }}
          REVIEW_APPROVED: ${{ github.event.inputs.approve_send == 'true' && 'true' || 'false' }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || secrets.DASHBOARD_URL || '' }}
          REPORT_URL: ${{ vars.REPORT_URL || secrets.REPORT_URL || '' }}
          # 설정돼 있으면 "개인 질의하기" 1:1 봇 deep link 버튼이 붙는다 (P0-C1.10, 비밀값 아님).
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME || secrets.TELEGRAM_BOT_USERNAME || '' }}
        run: |
          # 발송 전 버튼 타겟 검증 (동일 env). 요약↔전체 링크가 어긋나면 여기서 실패해 send 차단.
          python3 scripts/send_telegram.py --preflight
          python3 scripts/send_telegram.py

      # 경로 2: 커스텀 메시지 — live를 강제하지 않고 입력 메시지를 그대로 발송한다.
      # MESSAGE가 비어있지 않으면 send_telegram.py가 그 메시지를 보낸다 (DASHBOARD_URL/REPORT_URL 버튼 유지).
      - name: Send custom message
        if: steps.mode.outputs.live_publish == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          # P0-D3I — 발송 게이트: approve_send=true(수동 승인)일 때만 send, 그 외/예약은 manual(비발송).
          TELEGRAM_SEND_MODE: ${{ github.event.inputs.approve_send == 'true' && 'send' || 'manual' }}
          REVIEW_APPROVED: ${{ github.event.inputs.approve_send == 'true' && 'true' || 'false' }}
          MESSAGE: ${{ github.event.inputs.message }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || secrets.DASHBOARD_URL || '' }}
          REPORT_URL: ${{ vars.REPORT_URL || secrets.REPORT_URL || '' }}
          # 설정돼 있으면 "개인 질의하기" 1:1 봇 deep link 버튼이 붙는다 (P0-C1.10, 비밀값 아님).
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME || secrets.TELEGRAM_BOT_USERNAME || '' }}
        run: |
          # 발송 전 버튼 타겟 검증 (동일 env). 요약↔전체 링크가 어긋나면 여기서 실패해 send 차단.
          python3 scripts/send_telegram.py --preflight
          python3 scripts/send_telegram.py
