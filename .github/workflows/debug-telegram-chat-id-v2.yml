name: Debug Telegram Chat ID V2

on:
  workflow_dispatch:

jobs:
  debug-chat-id-v2:
    runs-on: ubuntu-latest

    steps:
      - name: Debug Telegram bot and chat ids
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()

          if not token:
              raise SystemExit("TELEGRAM_BOT_TOKEN is missing")

          def call(method, params=None):
              url = f"https://api.telegram.org/bot{token}/{method}"
              data = None
              if params:
                  data = urllib.parse.urlencode(params).encode("utf-8")
              with urllib.request.urlopen(url, data=data, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          print("DEBUG_VERSION: v2-inline-telegram-debug")

          me = call("getMe")
          print("BOT CHECK")
          print("ok:", me.get("ok"))

          if me.get("ok"):
              result = me.get("result", {})
              print("bot_id:", result.get("id"))
              print("bot_username:", result.get("username"))
              print("bot_first_name:", result.get("first_name"))

          print("---")

          webhook = call("getWebhookInfo")
          print("WEBHOOK CHECK")
          print("url_set:", bool(webhook.get("result", {}).get("url")))
          print("pending_update_count:", webhook.get("result", {}).get("pending_update_count"))

          delete_result = call("deleteWebhook", {"drop_pending_updates": "false"})
          print("deleteWebhook_ok:", delete_result.get("ok"))

          print("---")

          updates = call("getUpdates")
          print("UPDATES")
          print("ok:", updates.get("ok"))
          print("result_count:", len(updates.get("result", [])))

          for item in updates.get("result", []):
              print("update_id:", item.get("update_id"))
              msg = item.get("message") or item.get("channel_post") or {}
              chat = msg.get("chat", {})
              text = msg.get("text")

              if chat:
                  print("chat_id:", chat.get("id"))
                  print("type:", chat.get("type"))
                  print("title/name:", chat.get("title") or chat.get("username") or chat.get("first_name"))
                  print("text:", text)
                  print("---")
          PY
